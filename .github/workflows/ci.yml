name: CI

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

jobs:
  check:
    name: Build checks (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            python-scripts: Scripts
            ffmpeg-ext: .exe
          - os: macos-13
            target: x86_64-apple-darwin
            python-scripts: bin
            ffmpeg-ext: ""
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            python-scripts: bin
            ffmpeg-ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Setup Python venv (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m venv backend/venv
          backend\venv\Scripts\python -m pip install --upgrade pip
          backend\venv\Scripts\python -m pip install pyinstaller av pillow numpy opencv-python scenedetect

      - name: Setup Python venv (Unix)
        if: runner.os != 'Windows'
        run: |
          python -m venv backend/venv
          backend/venv/bin/python -m pip install --upgrade pip
          backend/venv/bin/python -m pip install pyinstaller av pillow numpy opencv-python scenedetect

      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ffmpeg -y
          New-Item -ItemType Directory -Force backend/bin
          Copy-Item "C:\ProgramData\chocolatey\bin\ffmpeg.exe" backend/bin/ffmpeg.exe -Force
          Copy-Item "C:\ProgramData\chocolatey\bin\ffprobe.exe" backend/bin/ffprobe.exe -Force

      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg
          mkdir -p backend/bin
          cp "$(which ffmpeg)" backend/bin/ffmpeg
          cp "$(which ffprobe)" backend/bin/ffprobe

      - name: Install FFmpeg (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          mkdir -p backend/bin
          cp "$(which ffmpeg)" backend/bin/ffmpeg
          cp "$(which ffprobe)" backend/bin/ffprobe

      - name: Build Python sidecar
        working-directory: frontend
        run: node scripts/build-sidecar.mjs

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - name: Check frontend build
        working-directory: frontend
        run: npm run build

      - name: Check Rust/Tauri compile
        working-directory: frontend/src-tauri
        run: cargo check --target ${{ matrix.target }}
